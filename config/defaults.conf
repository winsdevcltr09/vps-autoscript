# =============================================================================
# defaults.conf — Default configuration values for vps-autoscript
# All values here can be overridden by /etc/vps-autoscript/config/autoscript.conf
# =============================================================================

# --- Ports ---
PORT_SSH=22
PORT_DROPBEAR=444
PORT_STUNNEL=445
PORT_SSHWS=2095
PORT_NGINX_HTTP=80
PORT_NGINX_HTTPS=443
PORT_OPENVPN_TCP=1194
PORT_OPENVPN_UDP=1194
PORT_XRAY_API=10085
PORT_TROJAN_GO=2087

# Xray internal listener ports (localhost only, proxied by Nginx)
PORT_XRAY_VMESS_WS=23456
PORT_XRAY_VMESS_GRPC=31234
PORT_XRAY_VLESS_WS=14016
PORT_XRAY_VLESS_GRPC=24456
PORT_XRAY_TROJAN_WS=25432
PORT_XRAY_TROJAN_GRPC=33456

# UDP
PORT_UDPGW_1=7100
PORT_UDPGW_2=7200
PORT_UDPGW_3=7300

# --- Xray paths ---
XRAY_WS_PATH_VMESS="/vmess"
XRAY_WS_PATH_VLESS="/vless"
XRAY_WS_PATH_TROJAN="/trojan-ws"
XRAY_GRPC_SERVICE_VMESS="vmess-grpc"
XRAY_GRPC_SERVICE_VLESS="vless-grpc"
XRAY_GRPC_SERVICE_TROJAN="trojan-grpc"

# --- SSL ---
SSL_ISSUER="letsencrypt"
SSL_KEYLENGTH="ec-256"
SSL_RENEW_DAYS=30

# --- Trial accounts ---
TRIAL_DURATION_HOURS=24
TRIAL_MAX_LOGINS=2
TRIAL_MAX_QUOTA_GB=5

# --- User defaults ---
DEFAULT_MAX_LOGIN=2
DEFAULT_USER_EXPIRY_DAYS=30

# --- Autokill ---
AUTOKILL_ENABLED=true
AUTOKILL_INTERVAL_MINUTES=1
AUTOKILL_MAX_LOGIN=2

# --- Auto-reboot ---
AUTO_REBOOT_ENABLED=false
AUTO_REBOOT_HOUR=2

# --- Backup ---
BACKUP_ENABLED=false
BACKUP_HOUR=0
BACKUP_MINUTE=5
BACKUP_RETENTION_DAYS=7
BACKUP_RCLONE_REMOTE="gdrive"
BACKUP_RCLONE_PATH="VPSBackup"

# --- Notification ---
NOTIFY_TELEGRAM_ENABLED=false
NOTIFY_TELEGRAM_BOT_TOKEN=""
NOTIFY_TELEGRAM_CHAT_ID=""

# --- Bandwidth limit ---
BW_LIMIT_ENABLED=false
BW_LIMIT_DOWN_KBPS=0
BW_LIMIT_UP_KBPS=0

# --- Update ---
UPDATE_AUTO_CHECK=true
UPDATE_SOURCE="https://raw.githubusercontent.com/your-org/vps-autoscript/main"

# --- Timezone ---
TIMEZONE="Asia/Jakarta"

# --- Script version ---
SCRIPT_VERSION="3.0.0"
